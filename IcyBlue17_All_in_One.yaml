proxy-groups:
  - name: Main
    type: select
    url: https://ping.11451919.xyz
    proxies:
      - Auto
      - Manual Selection
      - 🇭🇰 HKG
      - 🇨🇳 TWN
      - 🇯🇵 JPN
      - 🇺🇲 USA
      - 🇸🇬 SGP
  - name: Auto
    type: url-test
    include-all: true
    url: https://ping.11451919.xyz
  - name: Manual Selection
    type: select
    include-all: true
    url: https://ping.11451919.xyz
  - name: SP
    include-all: true
    type: select

  - name: 🇭🇰 HKG
    include-all: true
    filter: (?i)港|HK|Hong Kong|HongKong|hongkong
    type: select
    url: https://ping.11451919.xyz
    interval: 300
    tolerance: 50
  - name: 🇯🇵 JPN
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    type: select
    url: https://ping.11451919.xyz
    interval: 300
    tolerance: 50
  - name: 🇺🇲 USA
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|Kirino|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
